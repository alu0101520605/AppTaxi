<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="icon" href="../assets/icons/favicon-96x96.png" type="image/png">

    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="../js/app.js"></script>

    <!--! ELIMINAR TEMP-->
    <script type="module" src="../js/temp-summary.js"></script>

    <!--? Cambiar a importacion ?-->
    <script type="module" src="/js/booking.js"></script>

    <title>Reserva : Need Taxi</title>
</head>

<body>
    <div class="container">

        <header-taxi></header-taxi>

        <div class="container-form">
            <h1>Reserva</h1>
            <div class="booking-type">
                <input type="radio" id="booking-now" name="booking-type" value="now" checked>
                <label for="booking-now" data-i18n="booking.tabs.request_now">Ahora</label>

                <input type="radio" id="booking-later" name="booking-type" value="date-time">
                <label for="booking-later" data-i18n="booking.tabs.schedule">Programar</label>
            </div>

            <form action="" method="post" novalidate>

                <section id="booking-form-main-view">

                    <div class="form-row">
                        <div class="form-group">

                            <label for="origin" data-i18n="booking.origin">Origen</label>

                            <select id="origin" name="origin" required>
                                <option value="" disabled selected>Selecciona un origen</option>
                                <option value="tfs">Aeropuerto Tenerife Sur</option>
                                <option value="tfn">Aeropuerto Tenerife Norte</option>
                                <option value="lpa">Aeropuerto Gran Canaria</option>
                            </select>
                           
                            <p id="origin-error" class="error" hidden>
                                <i class="fa-regular fa-circle-xmark"></i>
                                <span data-i18n="booking.errors.destination_invalid">Selecciona un origen válido</span>
                            </p>
                            
                        </div>

                        <div class="form-group">
                            <label for="destination" data-i18n="booking.destination">Destino</label>
                            <select id="destination" name="destination" required>
                                <option value="" disabled selected>Selecciona un destino</option>
                                <option value="DST1">DST1</option>
                                <option value="DST2">DST2</option>
                            </select>
                            
                            <p id="destination-error" class="error" hidden>
                                <i class="fa-regular fa-circle-xmark"></i>
                                <span data-i18n="booking.errors.destination_invalid">Selecciona un destino válido</span>
                            </p>

                        </div>
                    </div>

                    <div class="form-row date-container">
                        <div class="form-group form-group-small">
                            <label for="date" data-i18n="booking.date">Fecha</label>
                            <input type="date" id="date" name="date">
                        </div>

                        <div class="form-group form-group-small">
                            <label for="time" data-i18n="booking.time">Hora</label>
                            <input type="time" id="time" name="time">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group form-group-small form-group-icon">
                            <label for="passengers" data-i18n="booking.passengers">Pasajeros</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-person" aria-hidden="true"></i>
                                <input type="number" id="passengers" name="passengers" min="1" step="1" value="1">
                            </div>
                        </div>

                        <div class="form-group form-group-small form-group-icon">
                            <label for="luggage" data-i18n="booking.luggage">Maletas</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-solid fa-suitcase-rolling" aria-hidden="true"></i>
                                <input type="number" id="luggage" name="luggage" min="0" step="1" value="0">
                            </div>
                        </div>
                    </div>

                    <div class="reduced-mobility-group">
                        <label for="reduced-mobility" class="reduced-mobility-label">
                            <span class="switch">
                                <input type="checkbox" id="reduced-mobility" name="reduced_mobility"
                                    aria-describedby="reduced-mobility-help">
                                <span class="slider round" aria-hidden="true"></span>
                            </span>

                            <span class="reduced-mobility-text" data-i18n="booking.reduced_mobility">
                                Personas con movilidad reducida
                            </span>

                            <i class="fa-brands fa-accessible-icon" aria-hidden="true"></i>
                        </label>

                        <p id="reduced-mobility-help" class="help-text" data-i18n="booking.accessibility_details">
                            Indicar si algún pasajero necesita espacio o asistencia adicional
                        </p>
                    </div>

                    <div class="form-group">
                        <label for="accessibility-notes" data-i18n="booking.accessibility_notes">
                            Observaciones de accesibilidad (PRM)
                        </label>

                        <textarea id="accessibility-notes" name="accessibility_notes" rows="4"></textarea>
                    </div>

                    <div>
                        <button type="button" class="btn" data-i18n="booking.additional_options"
                            aria-controls="booking-form-options-view" aria-expanded="false">
                            Opciones adicionales
                        </button>
                    </div>

                </section>


                <section id="booking-form-options-view" hidden>
                    <h2 data-i18n="booking.additional_options">Opciones adicionales</h2>

                    <div class="additional-options-container">
                        <!--? Contenido de opciones adicionales -->
                    </div>
                </section>

                <!--! Convertir a componete y fuera el form-->
                <section id="booking-form-summary-view">
                    <div class="summary-container" aria-live="polite">

                        <h2 data-i18n="booking.summary.title">Resumen</h2>

                        <div class="summary-item" id="summary-date-time-item" hidden>
                            <span class="summary-label" data-i18n="booking.date_time">Fecha y hora</span>
                            <span class="summary-value" id="summary-date-time">---</span>
                        </div>

                        <div class="summary-item">
                            <span class="summary-label" data-i18n="booking.origin">Origen</span>
                            <span class="summary-value" id="summary-origin">ORIGEN PRUEBA</span>
                        </div>

                        <div class="summary-item">
                            <span class="summary-label" data-i18n="booking.destination">Destino</span>
                            <span class="summary-value" id="summary-destination">DESTINO PRUEBA</span>
                        </div>

                        <div class="summary-item">
                            <span class="summary-label" data-i18n="booking.passengers">Pasajeros</span>
                            <span class="summary-value" id="summary-passengers">1</span>
                        </div>

                        <div class="summary-item">
                            <span class="summary-label" data-i18n="booking.luggage">Maletas</span>
                            <span class="summary-value" id="summary-luggage">0</span>
                        </div>

                        <div class="summary-item summary-total">
                            <span class="summary-label" data-i18n="booking.price">Precio</span>
                            <span class="summary-value" id="summary-price">0 €</span>
                        </div>


                        <button type="submit" class="btn btn-primary" data-i18n="booking.confirm">
                            Continuar al pago
                        </button>

                    </div>
                </section>

            </form>
        </div>

        <footer-taxi></footer-taxi>

    </div>
</body>

</html>
