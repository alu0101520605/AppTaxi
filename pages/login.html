<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="icon" href="/assets/icons/favicon-96x96.png" type="image/png">

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/pages/login.css">
  <script type="module" src="/js/app.js"></script>
  
  <title>Iniciar sesión : Need Taxi</title>
</head>

<body>
  <div class="container">

    <header-taxi></header-taxi>

    <div class="login">

        <section>
        <h1 data-i18n="auth.login.welcome">¡Bienvenido!</h2>
        <p data-i18n="auth.login.subtitle">Inicia sesión para continuar</p>
        </section>

        <div>
        <section>
            <a href="/pages/home.html" class="btn btn-apple">
                <i class="fa-brands fa-apple" aria-hidden="true"></i>
                <span data-i18n="auth.login.continue_with_apple">Continuar con Apple</span>
            </a>

            <a href="/pages/home.html" class="btn btn-google">
                <i class="fa-brands fa-google" aria-hidden="true"></i>
                <span data-i18n="auth.login.continue_with_google">Continuar con Google</span>
            </a>

            <a href="/pages/home.html" class="btn btn-primary">
                <i class="fa-solid fa-phone" aria-hidden="true"></i>
                <span data-i18n="auth.login.continue_with_phone">Continuar con teléfono</span>
            </a>
        </section>
        </div>

        <div>
            <p> <span data-i18n="auth.login.no_account">¿No tienes cuenta?</span> <a href="./sign-up.html" data-i18n="auth.login.sign_up"> Regístrate </a></p>
        </div>

    </div>

    <footer-taxi></footer-taxi>
</div>

</body>

</html>
