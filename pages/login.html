<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="icon" href="../assets/icons/favicon-96x96.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css">
  <script type="module" src="../js/app.js"></script>
  <title>Acesso | Need Taxi</title>
</head>

<body>
  <div class="container">

    <header-taxi></header-taxi>

    <div>
      <label for="language">Idioma:</label>
      <select id="language">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <div>
      <h1 data-i18n="app.name">Need Taxi</h1>
      <p data-i18n="app.tagline">Tu taxi fácil y completo</p>
    </div>

    <section>
      <h2 data-i18n="auth.login.welcome">¡Bienvenido!</h2>
      <p data-i18n="auth.login.subtitle">Inicia sesión para continuar</p>
    </section>

    <section>
      <button type="button" class="btn btn-apple" data-i18n="auth.login.continue_with_apple">
        Continuar con Apple
      </button>

      <button type="button" class="btn btn-google" data-i18n="auth.login.continue_with_google">
        Continuar con Google
      </button>

      <button type="button" class="btn btn-primary" data-i18n="auth.login.continue_with_phone">
        Continuar con teléfono
      </button>
    </section>

    <div>
      <p data-i18n="auth.login.no_account">¿No tienes cuenta?</p>
    </div>

    <footer-taxi></footer-taxi>
</div>

</body>

</html>
